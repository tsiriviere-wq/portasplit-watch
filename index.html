<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PortaSplit Watch</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❄️</text></svg>">
<style>
  :root {
    --bg: #f4f6f8; --card: #ffffff; --text: #1a2330; --muted: #6b7686;
    --ok: #0a8f3c; --ok-bg: #e3f7ea; --ko: #c0392b; --ko-bg: #fdecea;
    --accent: #0f5fd7; --border: #e2e7ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #10151c; --card: #1a212b; --text: #e8edf3; --muted: #93a0b1;
      --ok: #3ddc7a; --ok-bg: #10301d; --ko: #ff7a66; --ko-bg: #33201c;
      --accent: #6ea8ff; --border: #2a3442;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); padding: 16px;
         max-width: 560px; margin: 0 auto; }
  h1 { font-size: 1.25rem; margin: 4px 0 2px; }
  .sub { color: var(--muted); font-size: .8rem; margin-bottom: 14px; }
  #banner { border-radius: 14px; padding: 18px 16px; margin-bottom: 14px;
            font-size: 1.15rem; font-weight: 700; text-align: center; }
  .banner-ok { background: var(--ok-bg); color: var(--ok); }
  .banner-ko { background: var(--ko-bg); color: var(--ko); }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
  .row { display: flex; align-items: center; justify-content: space-between;
         padding: 12px 14px; border-bottom: 1px solid var(--border);
         text-decoration: none; color: inherit; gap: 8px; }
  .row:last-child { border-bottom: none; }
  .row .name { font-weight: 600; }
  .row .price { color: var(--muted); font-size: .85rem; }
  .badge { padding: 3px 10px; border-radius: 999px; font-size: .78rem;
           font-weight: 700; white-space: nowrap; }
  .b-ok { background: var(--ok-bg); color: var(--ok); }
  .b-ko { background: var(--ko-bg); color: var(--ko); }
  .meta { color: var(--muted); font-size: .8rem; text-align: center; margin: 10px 0; }
  .btns { display: flex; gap: 10px; }
  .btn { flex: 1; display: block; text-align: center; padding: 13px 8px;
         border-radius: 12px; font-weight: 600; font-size: .95rem;
         text-decoration: none; border: none; cursor: pointer; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--accent);
                   border: 1px solid var(--border); }
  #err { color: var(--ko); text-align: center; font-size: .85rem; margin-top: 8px; }
</style>
</head>
<body>
  <h1>❄️ PortaSplit Watch</h1>
  <div class="sub">Midea PortaSplit 12 000 BTU réversible — alerte si ≤ 999 €</div>

  <div id="banner">Chargement…</div>
  <div class="card" id="list"></div>
  <div class="meta" id="meta"></div>

  <div class="btns">
    <button class="btn btn-primary" onclick="load()">🔄 Actualiser</button>
    <a class="btn btn-secondary" id="runlink" target="_blank" rel="noopener"
       href="https://github.com/tsiriviere-wq/portasplit-watch/actions/workflows/watch.yml">
       ▶️ Vérifier maintenant</a>
  </div>
  <div class="meta">« Vérifier maintenant » ouvre GitHub Actions : bouton
    <b>Run workflow</b> → résultat en push ntfy ~1 min après.<br>
    Vérification auto toutes les ~5-15 min, 24 h/24.</div>
  <div id="err"></div>

<script>
const USER = "tsiriviere-wq";
const RAW = `https://raw.githubusercontent.com/${USER}/portasplit-watch/main/state.json`;
const RUNS = `https://api.github.com/repos/${USER}/portasplit-watch/actions/runs?per_page=1`;

function esc(s) { const d = document.createElement("span"); d.textContent = s ?? ""; return d.innerHTML; }
function fmtDate(iso) {
  try { return new Date(iso).toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }); }
  catch { return iso; }
}

async function load() {
  const err = document.getElementById("err"); err.textContent = "";
  try {
    const r = await fetch(RAW + "?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("state.json HTTP " + r.status);
    const st = await r.json();
    const entries = Object.values(st.entries || {});
    const dispo = entries.filter(e => e.inStock);

    const banner = document.getElementById("banner");
    if (dispo.length) {
      banner.className = "banner-ok";
      banner.innerHTML = "🟢 DISPONIBLE : " + esc(dispo.map(e => e.name).join(", "));
    } else {
      banner.className = "banner-ko";
      banner.textContent = "🔴 Tout en rupture (" + entries.length + " enseignes)";
    }

    document.getElementById("list").innerHTML = entries.map(e => {
      const badge = e.inStock ? '<span class="badge b-ok">EN STOCK</span>'
                              : '<span class="badge b-ko">Rupture</span>';
      const price = e.price != null ? esc(e.price) + " €" : "prix n/c";
      const inner = `<div><div class="name">${esc(e.name)} ›</div>
                     <div class="price">${price}</div></div>${badge}`;
      return e.url ? `<a class="row" href="${esc(e.url)}" target="_blank" rel="noopener">${inner}</a>`
                   : `<div class="row">${inner}</div>`;
    }).join("");

    let meta = "Statuts relevés le " + fmtDate(st.updatedAt) +
               " · Magasins physiques en stock : " + (st.storesInStock ?? "?");
    try {
      const runs = await (await fetch(RUNS)).json();
      const run = runs.workflow_runs && runs.workflow_runs[0];
      if (run) meta += "<br>Dernière vérification : " + fmtDate(run.run_started_at) +
                       (run.conclusion === "failure" ? " ⚠️ (échec)" : " ✅");
    } catch { /* quota API GitHub : non bloquant */ }
    document.getElementById("meta").innerHTML = meta;
  } catch (e) {
    err.textContent = "Erreur de chargement : " + e.message;
  }
}
load();
</script>
</body>
</html>
